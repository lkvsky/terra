runtime: nodejs22
env: standard
instance_class: F2

automatic_scaling:
  max_instances: 5
  min_instances: 0
  target_cpu_utilization: 0.65

env_variables:
  NODE_ENV: production
  # Secrets are injected via Cloud Secret Manager or set in the Cloud Console.
  # Do NOT hardcode secrets here — use Secret Manager references or the App Engine
  # environment variables UI in GCP Console.
  #
  # Required variables:
  #   DATABASE_URL
  #   NEXTAUTH_URL
  #   NEXTAUTH_SECRET
  #   GOOGLE_CLIENT_ID
  #   GOOGLE_CLIENT_SECRET
  #   GOOGLE_CALENDAR_ID
  #   GOOGLE_SERVICE_ACCOUNT_JSON
  #   ADMIN_EMAILS

handlers:
  - url: /.*
    script: auto
    secure: always
